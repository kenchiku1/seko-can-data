<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seko-can.com | 一級建築施工管理技士</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; }
        .blur-text { filter: blur(5px); user-select: none; pointer-events: none; opacity: 0.6; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const liffId = "2009463648-LX7h6H1q";
        const SECRET_PASSWORD = "KENRYU"; 

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [view, setView] = useState('menu'); 
            const [mode, setMode] = useState('shoken');
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [showModal, setShowModal] = useState(false);
            const [isExplaining, setIsExplaining] = useState(false);
            const [judge, setJudge] = useState('');
            const [explanation1, setExplanation1] = useState(''); 
            const [explanation2, setExplanation2] = useState(''); 
            const [showPassword, setShowPassword] = useState(false);
            const [inputPass, setInputPass] = useState('');
            const [stats, setStats] = useState({ seen: 0, total: 0 });

            useEffect(() => {
                liff.init({ liffId }).then(() => {
                    if (liff.isLoggedIn()) { 
                        setIsLoggedIn(true);
                        updateStats();
                    } else { liff.login(); }
                });
            }, []);

            // 🔽 施工履歴（重複回避のためのユニークID管理）
            const getHistory = () => JSON.parse(localStorage.getItem('seko_final_history') || '[]');
            const saveHistory = (q) => {
                const history = getHistory();
                const id = q.id || `${q.year}-${q.no}-${q.question.substring(0,5)}`;
                if (!history.includes(id)) {
                    history.push(id);
                    localStorage.setItem('seko_final_history', JSON.stringify(history));
                }
            };
            const updateStats = async () => {
                try {
                    const res = await fetch('/H20-R7.json');
                    const data = await res.json();
                    const all = Array.isArray(data) ? data : (data.questions || []);
                    setStats({ seen: getHistory().length, total: all.length });
                } catch(e) {}
            };

            const startQuiz = async (m) => {
                setMode(m);
                setView('loading');
                setScore(0);
                try {
                    const res = await fetch('/H20-R7.json');
                    const data = await res.json();
                    let all = Array.isArray(data) ? data : (data.questions || []);
                    
                    const history = getHistory();
                    // 🚨 未解答の問題のみを抽出（年度・番号・文頭5文字で識別）
                    let unread = all.filter(q => {
                        const id = q.id || `${q.year}-${q.no}-${q.question.substring(0,5)}`;
                        return !history.includes(id);
                    });

                    // 全部解き終わっていたらリセット（全問復活）
                    if (unread.length === 0) {
                        localStorage.removeItem('seko_final_history');
                        unread = all;
                    }

                    // 🔥 【最強シャッフル】
                    // 頻出度(frequency)をベースにしつつ、大きな乱数を加えて順番を完全にバラバラにする
                    const shuffled = unread.map(q => ({
                        ...q,
                        sortVal: (Number(q.frequency) || 1) * 0.1 + Math.random() // 頻出度は隠し味程度、乱数を主役にする
                    })).sort((a, b) => b.sortVal - a.sortVal);

                    setQuestions(shuffled);
                    setCurrentIdx(0);
                    setView('quiz');
                } catch (e) { alert("読込エラー"); setView('menu'); }
            };

            const handleAnswer = async (key, text) => {
                const q = questions[currentIdx];
                const isCorrect = String(key) === String(q.answer);
                if (isCorrect) setScore(score + 1);
                
                // 完工（解答）を記録
                saveHistory(q);

                setJudge(isCorrect ? '⭕️ 正解' : '❌ 不正解');
                setShowModal(true);       
                setIsExplaining(true);    
                
                const prompt = (mode==='shoken'?"先輩監督":"総監督") + "として即答。前置き不要。\n問題:" + q.question + "\n正解:" + q.answer + "\n回答:" + text + "\n【1次】根拠(80字)\n【2次】現場実務の要(80字)";

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: prompt })
                    });
                    const data = await res.json();
                    const parts = (data.result || "").split('【2次】');
                    setExplanation1(parts[0].replace('【1次】','').trim());
                    setExplanation2(parts[1] ? parts[1].trim() : "現場管理の要点です。");
                } catch(e) { setExplanation1("エラー"); }
                setIsExplaining(false); 
            };

            if (!isLoggedIn) return null;

            if (view === 'menu') {
                return (
                    <div className="max-w-md mx-auto p-6 pt-12">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 text-center border-t-8 border-blue-700">
                            <h1 className="text-4xl font-black mb-1 italic text-gray-800 tracking-tighter">seko-can</h1>
                            <p className="text-blue-700 font-bold mb-6 text-[10px] tracking-widest uppercase">Construction Management AI</p>
                            
                            {/* 📈 進捗状況の見える化 */}
                            <div className="mb-10 bg-blue-50 p-4 rounded-2xl border border-blue-100">
                                <p className="text-[10px] font-bold text-blue-400 mb-2 uppercase tracking-widest">Mastery Progress</p>
                                <div className="flex justify-between text-[10px] font-black mb-1 px-1">
                                    <span className="text-blue-600">既習: {stats.seen}</span>
                                    <span className="text-gray-400">未習: {stats.total - stats.seen}</span>
                                </div>
                                <div className="w-full bg-blue-100 h-1.5 rounded-full overflow-hidden">
                                    <div className="bg-blue-600 h-full transition-all duration-1000" style={{ width: `${(stats.seen/stats.total)*100}%` }}></div>
                                </div>
                            </div>

                            {!showPassword ? (
                                <div className="space-y-4">
                                    <button onClick={() => startQuiz('shoken')} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-xl active:scale-95 transition">🔵 ショーケン版を開始</button>
                                    <button onClick={() => setShowPassword(true)} className="w-full py-5 bg-gray-800 text-white rounded-2xl font-bold shadow-xl active:scale-95 transition">🔒 建龍版を解除</button>
                                    <button onClick={()=>{if(confirm('全ての学習記録を消去し、全問復活させますか？')) {localStorage.removeItem('seko_final_history'); updateStats(); location.reload();}}} className="text-[10px] text-gray-300 underline mt-4 block w-full text-center">学習履歴をリセット</button>
                                </div>
                            ) : (
                                <div className="bg-gray-50 p-6 rounded-2xl border-2 border-dashed fade-in">
                                    <p className="font-bold text-gray-600 mb-4 text-xs">暗証コード: KENRYU</p>
                                    <input type="text" value={inputPass} onChange={(e)=>setInputPass(e.target.value)} className="w-full p-4 border-2 rounded-xl mb-4 text-center font-black text-xl tracking-widest uppercase focus:border-blue-500 outline-none" placeholder="******" />
                                    <div className="flex gap-2">
                                        <button onClick={()=>setShowPassword(false)} className="flex-1 py-3 bg-gray-300 rounded-xl font-bold">戻る</button>
                                        <button onClick={()=>{ if(inputPass.toUpperCase()===SECRET_PASSWORD) startQuiz('kenno'); else alert("コード不一致"); }} className="flex-1 py-3 bg-blue-700 text-white rounded-xl font-bold">解除</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (view === 'result') {
                const rate = Math.round((score / questions.length) * 100);
                return (
                    <div className="max-w-md mx-auto p-6 pt-12 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-10 text-center border-t-8 border-orange-500">
                            <h2 className="text-xs font-bold mb-6 text-gray-400 tracking-widest uppercase">Mission Result</h2>
                            <div className="mb-8 text-6xl font-black text-gray-800">{rate}%</div>
                            <div className="bg-orange-50 p-6 rounded-2xl mb-8 border border-orange-100 font-black text-orange-600">
                                {rate === 100 ? '伝説の監理技術者' : rate >= 80 ? '凄腕現場総監督' : rate >= 60 ? '一級施工管理技士' : '現場見習い'}
                            </div>
                            <button onClick={() => { setView('menu'); updateStats(); }} className="w-full py-4 bg-gray-800 text-white rounded-xl font-bold shadow-lg active:scale-95 transition">事務所へ戻る</button>
                        </div>
                    </div>
                );
            }

            if (view === 'loading') return <div className="text-center mt-40 font-black text-gray-300 animate-pulse tracking-widest uppercase">Loading New Projects...</div>;

            const q = questions[currentIdx];
            return (
                <div className="max-w-md mx-auto bg-white min-h-screen p-6 relative">
                    {!showModal ? (
                        <div className="fade-in">
                            <div className="flex justify-between items-center mb-6 border-b-2 border-gray-50 pb-2">
                                <p className="text-[10px] font-bold text-gray-400 uppercase">Step.{currentIdx + 1} / {questions.length}</p>
                                <p className="text-[10px] font-bold text-blue-700 uppercase">{mode}</p>
                            </div>
                            <p className="font-bold text-gray-800 text-xl mb-10 leading-relaxed tracking-tight">{q.question}</p>
                            <div className="space-y-4">
                                {q.choices && Object.entries(q.choices).map(([k, t]) => (
                                    <button key={k} onClick={() => handleAnswer(k, t)} className="w-full p-5 text-left border-2 border-gray-100 rounded-2xl flex items-start active:bg-blue-50 transition-all">
                                        <span className="w-7 h-7 bg-gray-100 rounded-full text-center text-[10px] leading-7 mr-4 flex-shrink-0 font-black text-gray-400">{k}</span>
                                        <span className="text-sm font-bold text-gray-700 leading-snug">{t}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="fade-in flex flex-col h-full">
                            <div className={`text-6xl font-black text-center mb-10 py-4 rounded-3xl ${judge.includes('⭕️') ? 'text-green-600 bg-green-50' : 'text-red-600 bg-red-50'}`}>{judge}</div>
                            <div className="flex-1 space-y-8 overflow-y-auto">
                                <div>
                                    <h3 className="text-[10px] font-black text-blue-600 mb-2 uppercase tracking-widest">■ Examination Guide</h3>
                                    <div className="bg-blue-50 p-5 rounded-2xl text-sm font-bold text-gray-700 leading-relaxed border-l-4 border-blue-600">{isExplaining ? 'AI解析中...' : explanation1}</div>
                                </div>
                                <div>
                                    <h3 className="text-[10px] font-black text-red-600 mb-2 uppercase tracking-widest">■ Site Management</h3>
                                    {mode === 'kenno' ? (
                                        <div className="bg-red-50 p-5 rounded-2xl text-sm font-bold text-gray-700 leading-relaxed border-l-4 border-red-600">{isExplaining ? '分析中...' : explanation2}</div>
                                    ) : (
                                        <div className="relative rounded-2xl bg-gray-50 p-5 border-2 border-dashed border-gray-300 overflow-hidden">
                                            <p className="text-sm blur-text font-bold leading-relaxed">（ここは建龍版限定のアドバイスエリアです。記述対策に繋がる実戦知識を表示します）</p>
                                            <button onClick={() => { setView('menu'); setShowModal(false); setShowPassword(true); }} className="absolute inset-0 m-auto h-12 w-48 bg-gray-900 text-white text-[10px] font-black rounded-full shadow-2xl active:scale-95 transition">🔒 建龍版でアンロック</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="mt-12 space-y-4 pb-12">
                                {!isExplaining && <button onClick={()=>{setShowModal(false); if(currentIdx+1 < questions.length) setCurrentIdx(currentIdx+1); else { setView('result'); updateStats(); } }} className="w-full py-5 bg-blue-700 text-white rounded-2xl font-black text-xl shadow-xl active:scale-95 transition">NEXT PROJECT</button>}
                                <button onClick={()=>{setView('menu'); setShowModal(false); updateStats();}} className="text-gray-400 text-[10px] font-bold underline w-full text-center tracking-widest">Return to Base</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
