<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seko-can.com | 一級建築施工管理技士 AI過去問アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const liffId = "2009463648-LX7h6H1q";

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [view, setView] = useState('menu'); // 'menu' or 'quiz'
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);

            // LINEログイン初期化
            useEffect(() => {
                const init = async () => {
                    try {
                        await liff.init({ liffId });
                        if (liff.isLoggedIn()) {
                            setIsLoggedIn(true);
                        } else {
                            liff.login();
                        }
                    } catch (e) { console.error(e); }
                };
                init();
            }, []);

            // 問題データの読み込み（H20-R7.jsonを想定）
            const startQuiz = async () => {
                try {
                    const res = await fetch('/H20-R7.json');
                    const data = await res.json();
                    setQuestions(data.sort(() => 0.5 - Math.random()).slice(0, 10)); // 10問ランダム
                    setView('quiz');
                } catch (e) {
                    alert("問題データの読み込みに失敗しました。ファイルがVercelにあるか確認してください。");
                }
            };

            if (!isLoggedIn) {
                return <div className="flex h-screen items-center justify-center">認証中...</div>;
            }

            if (view === 'menu') {
                return (
                    <div className="max-w-md mx-auto p-6 pt-20 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 text-center border-t-8 border-blue-600">
                            <h1 className="text-3xl font-black mb-2">seko-can.com</h1>
                            <p className="text-blue-600 font-bold mb-8">一級建築施工管理技士 合格アプリ</p>
                            <button onClick={startQuiz} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition mb-4">
                                【ショーケン版】1次試験を開始
                            </button>
                            <p className="text-xs text-gray-400">ログイン中：{liff.getDecodedIDToken()?.name} 様</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto p-4 fade-in">
                    <div className="bg-white rounded-2xl p-6 shadow-lg">
                        <p className="text-sm text-blue-600 font-bold mb-2">第 {currentIdx + 1} 問</p>
                        <p className="font-bold text-lg mb-6">{questions[currentIdx]?.question}</p>
                        <div className="space-y-3">
                            {[1, 2, 3, 4].map(n => (
                                <button key={n} className="w-full p-4 text-left border-2 border-gray-100 rounded-xl hover:bg-blue-50 transition font-medium">
                                    {questions[currentIdx]?.[`option${n}`]}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
