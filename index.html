<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seko-can.com | 一級建築施工管理技士</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const liffId = "2009463648-LX7h6H1q";

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [view, setView] = useState('menu'); 
            const [mode, setMode] = useState('shoken');
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            
            // AI解説用のスイッチ（追加設備）
            const [showModal, setShowModal] = useState(false);
            const [isExplaining, setIsExplaining] = useState(false);
            const [explanation, setExplanation] = useState('');

            useEffect(() => {
                const init = async () => {
                    try {
                        await liff.init({ liffId });
                        if (liff.isLoggedIn()) { setIsLoggedIn(true); } else { liff.login(); }
                    } catch (e) { console.error("LIFF Error", e); }
                };
                init();
            }, []);

            const startQuiz = async (selectedMode) => {
                setMode(selectedMode);
                setView('loading');
                try {
                    const response = await fetch('/H20-R7.json');
                    const data = await response.json();
                    setQuestions(data);
                    setCurrentIdx(0);
                    setView('quiz');
                } catch (error) {
                    alert("データの読み込みに失敗しました。");
                    setView('menu');
                }
            };

            // 🔽 AI中継ボックスを呼び出す関数
            const handleAnswer = async (choiceKey, choiceText) => {
                const currentQ = questions[currentIdx];
                setShowModal(true);       // 解説画面を出す
                setIsExplaining(true);    // 「考え中...」のぐるぐるを出す
                setExplanation('');       // 前の解説を消す

                try {
                    // 以前所長が作っていた「/api/chat」へデータを送る配線
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            question: currentQ.question,
                            userAnswer: choiceText,
                            isPremium: mode === 'kenno'
                        })
                    });
                    
                    if (!response.ok) throw new Error("APIエラー");
                    
                    const data = await response.json();
                    // AIからの返答をセット
                    setExplanation(data.reply || data.message || data.text || "【テスト表示】AIからの解説データを受信しました。（※実際の文章はapi側の設定に依存します）");
                } catch(error) {
                    setExplanation("AIの呼び出しに失敗しました。Vercelのapiフォルダ（chat.js等）の設定を確認してください。");
                }
                setIsExplaining(false); // ぐるぐるを止める
            };

            const nextQuestion = () => {
                setShowModal(false);
                if (currentIdx + 1 < questions.length) {
                    setCurrentIdx(currentIdx + 1);
                } else {
                    alert('全問終了しました！トップに戻ります。');
                    setView('menu');
                }
            };

            if (!isLoggedIn) return <div style={{ textAlign: 'center', marginTop: '50px', fontWeight: 'bold' }}>認証ゲート通過中...</div>;

            if (view === 'menu') {
                return (
                    <div className="max-w-md mx-auto p-6 pt-12">
                        <div className="bg-white rounded-2xl shadow-xl p-8 text-center border-t-8 border-blue-600">
                            <h1 className="text-3xl font-black mb-2">seko-can.com</h1>
                            <p className="text-blue-600 font-bold mb-8 text-sm">一級建築施工管理技士 AI過去問アプリ</p>
                            
                            <button onClick={() => startQuiz('shoken')} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow mb-4 active:scale-95 transition">
                                【ショーケン版】<br/><span className="text-sm">1次試験 全範囲テストを開始</span>
                            </button>

                            <button onClick={() => startQuiz('kenno')} className="w-full py-4 bg-orange-600 text-white rounded-xl font-bold shadow active:scale-95 transition">
                                🔥【建能版】<br/><span className="text-sm">1次突破（2次直結型）を開始</span>
                            </button>
                            <p className="mt-8 text-xs text-gray-400 font-bold">ログイン中：相馬所長</p>
                        </div>
                    </div>
                );
            }

            if (view === 'loading') return <div className="text-center mt-20 font-bold text-gray-600">問題データ展開中...</div>;

            const currentQ = questions[currentIdx];
            if (!currentQ) return null;
            const choicesArray = currentQ.choices ? Object.entries(currentQ.choices) : [];

            return (
                <div className="max-w-md mx-auto p-4 pt-6 relative">
                    <div className="bg-white rounded-2xl p-6 shadow-xl border-t-8 border-blue-600">
                        <div className="flex justify-between items-center mb-4">
                            <p className="text-xs font-bold text-blue-600 bg-blue-50 py-1 px-3 rounded-full">
                                {mode === 'kenno' ? '🔥 建能版' : '📘 ショーケン版'}
                            </p>
                            <p className="text-xs font-bold text-gray-500">第 {currentIdx + 1} 問 / 全 {questions.length} 問</p>
                        </div>
                        
                        <div className="mb-2 text-xs text-gray-400 font-bold">
                            [{currentQ.year}年 {currentQ.session} No.{currentQ.no}] {currentQ.category} - {currentQ.subcategory}
                        </div>
                        
                        <p className="font-bold text-gray-800 leading-relaxed mb-6 text-lg">{currentQ.question}</p>

                        <div className="space-y-3">
                            {choicesArray.map(([key, text]) => (
                                <button 
                                    key={key}
                                    onClick={() => handleAnswer(key, text)}
                                    className="w-full p-4 text-left border-2 border-gray-100 rounded-xl hover:bg-blue-50 hover:border-blue-200 transition font-medium text-gray-700 active:bg-blue-100 flex items-start"
                                >
                                    <span className="inline-block w-6 h-6 bg-gray-100 rounded-full text-center text-xs leading-6 mr-3 text-gray-500 flex-shrink-0 mt-0.5">{key}</span>
                                    <span className="text-sm leading-relaxed">{text}</span>
                                </button>
                            ))}
                        </div>

                        <div className="mt-8 pt-4 border-t border-gray-100 text-center">
                            <button onClick={() => setView('menu')} className="text-gray-400 text-xs font-bold underline px-4 py-2">メニューに戻る</button>
                        </div>
                    </div>

                    {/* 🔽 AI解説の画面（モーダル） */}
                    {showModal && (
                        <div className="fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center p-4 z-50 fade-in">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl max-h-[85vh] overflow-y-auto">
                                <h3 className="font-black text-xl mb-4 text-blue-600 border-b pb-2">🤖 AI解説</h3>
                                
                                {isExplaining ? (
                                    <div className="text-center py-10">
                                        <div className="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600 mx-auto mb-4"></div>
                                        <p className="text-sm font-bold text-gray-500">AIが現場目線で解説を作成中...</p>
                                    </div>
                                ) : (
                                    <div className="mb-6 text-sm leading-relaxed text-gray-700 whitespace-pre-wrap font-medium">
                                        {explanation}
                                    </div>
                                )}
                                
                                <button 
                                    onClick={nextQuestion} 
                                    disabled={isExplaining}
                                    className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold disabled:bg-gray-300 disabled:cursor-not-allowed shadow active:scale-95 transition"
                                >
                                    {currentIdx + 1 < questions.length ? '次の問題へ進む' : '結果を見る'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
