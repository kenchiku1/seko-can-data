<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seko-can.com | 一級建築施工管理技士</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const liffId = "2009463648-LX7h6H1q";

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [view, setView] = useState('menu');
            const [mode, setMode] = useState('shoken');

            useEffect(() => {
                const init = async () => {
                    try {
                        await liff.init({ liffId });
                        if (liff.isLoggedIn()) { 
                            setIsLoggedIn(true); 
                        } else { 
                            liff.login(); 
                        }
                    } catch (e) { 
                        console.error("LIFF Error", e); 
                    }
                };
                init();
            }, []);

            if (!isLoggedIn) {
                return (
                    <div style={{ textAlign: 'center', marginTop: '50px', fontWeight: 'bold' }}>
                        認証ゲート通過中...
                    </div>
                );
            }

            if (view === 'menu') {
                return (
                    <div className="max-w-md mx-auto p-6 pt-12">
                        <div className="bg-white rounded-2xl shadow-xl p-8 text-center border-t-8 border-blue-600">
                            <h1 className="text-3xl font-black mb-2">seko-can.com</h1>
                            <p className="text-blue-600 font-bold mb-8 text-sm">一級建築施工管理技士 AI過去問アプリ</p>
                            
                            <button 
                                onClick={() => { setMode('shoken'); setView('quiz'); }}
                                className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow mb-4"
                            >
                                【ショーケン版】<br/><span className="text-sm">1次試験 全範囲テスト</span>
                            </button>

                            <button 
                                onClick={() => { setMode('kenno'); setView('quiz'); }}
                                className="w-full py-4 bg-orange-600 text-white rounded-xl font-bold shadow"
                            >
                                【建能版】<br/><span className="text-sm">1次突破（2次直結型）</span>
                            </button>

                            <p className="mt-8 text-xs text-gray-400 font-bold">ログイン中：相馬所長</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto p-6 pt-12">
                    <div className="bg-white rounded-2xl p-6 shadow-xl border-t-8 border-gray-800">
                        <p className="text-sm font-bold text-gray-500 mb-4">
                            {mode === 'kenno' ? '【建能版】テスト問題' : '【ショーケン版】テスト問題'}
                        </p>
                        <p className="font-bold text-lg mb-8">ここに問題が表示されます。</p>
                        <button 
                            onClick={() => setView('menu')} 
                            className="w-full py-4 bg-gray-200 text-gray-800 rounded-xl font-bold"
                        >
                            メニューに戻る
                        </button>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
