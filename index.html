<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seko-can.com | 一級建築施工管理技士</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const liffId = "2009463648-LX7h6H1q";

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [view, setView] = useState('menu');

            useEffect(() => {
                const init = async () => {
                    try {
                        await liff.init({ liffId });
                        if (liff.isLoggedIn()) {
                            setIsLoggedIn(true);
                        } else {
                            liff.login();
                        }
                    } catch (e) { console.error("LIFF Error:", e); }
                };
                init();
            }, []);

            if (!isLoggedIn) {
                return (
                    <div className="flex h-screen items-center justify-center bg-white text-gray-500 font-bold">
                        認証ゲートを通過中...
                    </div>
                );
            }

            if (view === 'menu') {
                return (
                    <div className="max-w-md mx-auto p-6 pt-16">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 text-center border-t-8 border-blue-600">
                            <h1 className="text-3xl font-black text-gray-900 mb-1">seko-can.com</h1>
                            <p className="text-blue-600 font-bold mb-8 text-sm">一級建築施工管理技士 AI過去問アプリ</p>
                            
                            <button 
                                onClick={() => setView('quiz')}
                                className="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform mb-4 text-lg"
                            >
                                【ショーケン版】<br/>1次試験を開始
                            </button>

                            <div className="mt-6 p-4 bg-gray-50 rounded-xl border border-gray-100">
                                <p className="text-xs text-gray-400 font-medium">ログイン中</p>
                                <p className="text-sm font-bold text-gray-600">相馬所長（テストユーザー）</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto p-4 pt-10">
                    <div className="bg-white rounded-2xl p-6 shadow-xl border-l-4 border-blue-600">
                        <p className="text-xs text-blue-600 font-black mb-2 tracking-widest uppercase">Question 01</p>
                        <p className="font-bold text-gray-800 leading-relaxed mb-8">「建築基準法」において、床面積の算定に関する記述として、正しいものはどれか？</p>
                        
                        <div className="space-y-3">
                            {["ピロティ部分は算定に含める", "吹抜け部分は算定から除外する", "階段室は2階分を算定する", "ベランダはすべて算定に含める"].map((txt, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => alert('正解！施工管理の基本ですね。')}
                                    className="w-full p-4 text-left border border-gray-200 rounded-xl hover:bg-blue-50 hover:border-blue-200 transition font-bold text-gray-700 active:bg-blue-100"
                                >
                                    <span className="inline-block w-6 h-6 bg-gray-100 rounded-full text-center text-xs leading-6 mr-3 text-gray-400">{i+1}</span>
                                    {txt}
                                </button>
                            ))}
                        </div>
                        <button onClick={() => setView('menu')} className="mt-8 text-gray-400 text-xs font-bold underline w-full text-center">メニューに戻る</button>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
