<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セコカン金太朗・AIアプリ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; line-height: 1.8; background: #eef2f3; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #0070f3; font-size: 1.4rem; border-bottom: 3px solid #0070f3; padding-bottom: 10px; margin-top: 0; }
        .meta-info { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
        .choice { display: block; width: 100%; margin: 12px 0; padding: 15px; text-align: left; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: #fff; font-size: 1rem; transition: 0.2s; }
        .choice:hover { background: #f0f7ff; border-color: #0070f3; }
        #explanation { display: none; margin-top: 20px; padding: 20px; background: #f0f9ff; border-left: 6px solid #0070f3; border-radius: 4px; }
        .ans-block { margin-top: 15px; display: block; }
        .message-box { background: #fff4e5; border-left: 6px solid #ffa500; padding: 15px; margin-top: 15px; font-size: 0.95rem; }
        .nav-btn { background: #0070f3; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; width: 100%; margin-top: 20px; font-weight: bold; }
        .result-rank { font-size: 1.5rem; font-weight: bold; color: #d32f2f; text-align: center; margin: 20px 0; }
        .judge-msg { font-size: 1.5rem; font-weight: bold; text-align: center; margin-bottom: 15px; padding: 10px; border-radius: 8px; }
        .correct { color: #2e7d32; background: #e8f5e9; border: 2px solid #2e7d32; }
        .incorrect { color: #c62828; background: #ffebee; border: 2px solid #c62828; }
    </style>
</head>
<body>
    <div id="app" class="card">
        <h1>セコカン金太朗・AIアプリ</h1>
        <div id="quiz-container">
            <div id="judge-area"></div>
            <div class="meta-info" id="meta-area"></div>
            <div id="question-area" style="font-weight: bold; font-size: 1.1rem;"></div>
            <div id="choices-area"></div>
            <div id="explanation"></div>
            <button id="next-btn" class="nav-btn" style="display:none;" onclick="nextQuestion()">次の問題へ</button>
        </div>
        <div id="result-container" style="display:none;">
            <div class="result-rank" id="rank-display"></div>
            <div id="score-details" style="text-align: center;"></div>
            <button class="nav-btn" onclick="location.reload()">もう一度挑戦する</button>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let currentIndex = 0;
        let score = 0;

        fetch('H20-R7.json')
            .then(res => res.json())
            .then(data => {
                allQuestions = data;
                showQuestion();
            });

        function showQuestion() {
            const q = allQuestions[currentIndex];
            document.getElementById('explanation').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('judge-area').innerHTML = '';
            document.getElementById('judge-area').className = ''; 
            document.getElementById('meta-area').innerHTML = `${q.year}年 ${q.category} ＞ ${q.subcategory}`;
            document.getElementById('question-area').innerHTML = `【${q.id}】<br>${q.question}`;
            let choicesHtml = '';
            for (let key in q.choices) {
                choicesHtml += `<button class="choice" onclick="checkAns('${key}')">${key}. ${q.choices[key]}</button>`;
            }
            document.getElementById('choices-area').innerHTML = choicesHtml;
        }

        function checkAns(selected) {
            const q = allQuestions[currentIndex];
            const judgeArea = document.getElementById('judge-area');
            
            if (selected == q.answer) {
                score++;
                judgeArea.innerHTML = "◯ 正解！";
                judgeArea.className = "judge-msg correct";
            } else {
                judgeArea.innerHTML = `× 不正解（あなたの選択：${selected}）`;
                judgeArea.className = "judge-msg incorrect";
            }

            let formattedExp = q.explanation
                .replace(/([2-4]\.)/g, '<br><span class="ans-block">$1</span>')
                .replace(/(1\.)/, '<span class="ans-block">$1</span>');

            let expHtml = `<strong>正解：${q.answer}</strong><hr>${formattedExp}`;
            
            if (q.examiner_trap || q.examiner_message) {
                expHtml += `<div class="message-box">
                    <strong>👷‍♂️ 現場所長の目線：</strong><br>${q.examiner_message}<br>
                    <br><strong>⚠️ 出題者の罠：</strong><br>${q.examiner_trap}
                </div>`;
            }

            document.getElementById('explanation').innerHTML = expHtml;
            document.getElementById('explanation').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
            const btns = document.getElementsByClassName('choice');
            for(let btn of btns) btn.disabled = true;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < allQuestions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            const rate = (score / allQuestions.length) * 100;
            let rank = (rate >= 100) ? "🏆 統括所長級" : (rate >= 80) ? "🏗️ 現場所長級" : (rate >= 60) ? "👷‍♂️ 主任級" : "🔧 見習い工級";
            document.getElementById('rank-display').innerText = rank;
            document.getElementById('score-details').innerHTML = `正解数: ${score} / ${allQuestions.length}<br>正解率: ${rate.toFixed(1)}%`;
        }
    </script>
</body>
</html>
