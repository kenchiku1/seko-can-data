<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seko-can.com | エラー調査</title>
    
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            document.body.innerHTML = '<div style="padding:20px; background:#fff; color:red; font-family:sans-serif; border-top: 8px solid red; margin: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">' +
                '<h2 style="margin-top:0; font-size: 20px; font-weight: 900;">🚨 アプリ内部でショート（エラー）発生</h2>' +
                '<p style="font-weight: bold; margin-bottom: 5px;">【エラーの詳細】</p>' +
                '<div style="background: #fee; padding: 10px; border-radius: 5px; margin-bottom: 15px; word-break: break-all;">' + msg + '</div>' +
                '<p><strong>発生箇所:</strong> ' + lineNo + '行目</p>' +
                '<p style="color:#666; font-size:13px; margin-top:20px; font-weight: bold;">※所長、この赤い画面のスクショを私に見せてください！一発で直します。</p>' +
            '</div>';
            return false;
        };

        const originalConsoleError = console.error;
        console.error = function(...args) {
            originalConsoleError.apply(console, args);
            const errStr = args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
            if(errStr.includes('SyntaxError') || errStr.includes('Error:')) {
                const el = document.createElement('div');
                el.style.cssText = 'padding:15px; background:#fee; color:red; margin:10px; border:2px solid red; border-radius: 8px; font-family:sans-serif; font-weight: bold;';
                el.innerHTML = '🚨 翻訳エラー（Babel）:<br><span style="font-weight:normal;">' + errStr + '</span><br><br><span style="color:#333; font-size:12px;">※この赤い画面のスクショを私に見せてください！</span>';
                document.body.appendChild(el);
            }
        };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root">
        <div style="padding: 50px 20px; text-align: center; font-family: sans-serif;">
            <div style="font-size: 24px; font-weight: 900; margin-bottom: 10px;">⏳ 読込中...</div>
            <div style="color: #666; font-weight: bold;">（この画面のまま止まる場合は、コードの翻訳エラーです。<br>赤いエラー画面が出るのをお待ちください）</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const liffId = "2009463648-LX7h6H1q";

        function App() {
            const [status, setStatus] = useState("テスト開始");

            useEffect(() => {
                const init = async () => {
                    try {
                        setStatus("認証ゲート（LIFF）の起動中...");
                        await liff.init({ liffId });
                        if (liff.isLoggedIn()) {
                            setStatus("✅ ログイン完了！アプリは正常です！");
                        } else {
                            setStatus("未ログインです。認証画面へ進みます...");
                            liff.login();
                        }
                    } catch (e) { 
                        setStatus("⚠️ 認証エラー: " + e.message);
                    }
                };
                init();
            }, []);

            return (
                <div className="max-w-md mx-auto p-6 pt-12">
                    <div className="bg-white rounded-2xl shadow-xl p-8 text-center border-t-8 border-green-600">
                        <h1 className="text-2xl font-black text-green-600 mb-4">通電テスト完了！</h1>
                        <p className="font-bold text-gray-800 text-lg mb-6">{status}</p>
                        <p className="text-sm text-gray-600 text-left bg-gray-50 p-4 rounded-lg font-medium leading-relaxed">
                            もしこの緑色の画面が出た場合、真っ白になっていた原因は「複雑な問題表示コード」のどこかに隠れていました。<br/>
                            <br/>
                            所長、この画面（緑か、赤か）のスクショを私に見せてください！
                        </p>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
