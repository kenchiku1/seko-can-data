<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seko-can.com | 一級建築施工管理技士 AI過去問アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const liffId = "2009463648-LX7h6H1q";

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);

            useEffect(() => {
                const initializeLiff = async () => {
                    try {
                        await liff.init({ liffId });
                        if (liff.isLoggedIn()) {
                            setIsLoggedIn(true);
                        } else {
                            liff.login();
                        }
                    } catch (error) {
                        console.error("LIFF初期化エラー", error);
                    }
                };
                initializeLiff();
            }, []);

            if (!isLoggedIn) {
                return (
                    <div className="flex flex-col items-center justify-center h-screen bg-gray-50">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
                        <p className="text-gray-600 font-bold">認証ゲートを通過中...</p>
                    </div>
                );
            }

            // --- ログイン成功後、ここから下がアプリの本編 ---
            return (
                <div className="max-w-md mx-auto p-4 pt-10">
                    <div className="bg-white rounded-2xl shadow-xl p-8 text-center border-t-8 border-blue-600">
                        <h1 className="text-2xl font-black text-gray-900 mb-2">seko-can.com</h1>
                        <p className="text-sm font-bold text-blue-600 mb-6">一級建築施工管理技士 AI過去問アプリ</p>
                        
                        <div className="space-y-4">
                            <button className="w-full py-4 bg-gradient-to-r from-indigo-600 to-blue-600 text-white rounded-xl font-bold shadow-lg hover:opacity-90 transition">
                                【ショーケン版】<br/>1次試験 全範囲テストを開始
                            </button>
                            <button className="w-full py-4 bg-gradient-to-r from-amber-700 to-orange-800 text-white rounded-xl font-bold shadow-lg hover:opacity-90 transition">
                                🔥【建能版】<br/>1次試験突破（2次直結型）<br/>ルートを開始
                            </button>
                        </div>
                        <p className="mt-8 text-[10px] text-gray-400">© 1級建築施工管理・認証</p>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
