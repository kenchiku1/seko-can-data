<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>seko-can.com | 一級セコカンAI過去問アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const GEMINI_API_KEY = "AIzaSyB05vGQtUEQZj6cBC_kZQB3pbguLS7YGCY"; 
    const JSON_FILE_PATH = "./all_questions.json";
    const BAND_URL = "https://band.us/n/a3a7bd17c103Z";
    const SHUTDOWN_DATE = new Date('2026-04-06T00:00:00+09:00');
    
    const SYSTEM_PROMPT = `
あなたは20年現場経験のベテラン監督「セコカン金太郎」です。
以下の1次試験問題について、受験生に以下の4点を解説してください。
①正誤の明確な理由
②現場でのリアルなイメージ
③出題者の罠とメッセージ
④この知識が、2次試験の「経験記述」や「施工用語」でどう問われるか、どう活かせるかを1〜2行で熱く指導すること。
出力は読みやすく改行を入れてください。
`;

    function App() {
      const [allQuestions, setAllQuestions] = useState([]);
      const [sessionQuestions, setSessionQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [weaknessQueue, setWeaknessQueue] = useState([]);
      
      const [mode, setMode] = useState('loading');
      const [selectedChoice, setSelectedChoice] = useState(null);
      const [isCorrect, setIsCorrect] = useState(null);
      const [explanation, setExplanation] = useState('');
      const [isAiLoading, setIsAiLoading] = useState(false);
      
      const [score, setScore] = useState(0);
      const [totalAnswered, setTotalAnswered] = useState(0);

      useEffect(() => {
        if (new Date() >= SHUTDOWN_DATE) {
          setMode('expired');
        } else {
          fetch(JSON_FILE_PATH)
            .then(res => res.json())
            .then(data => {
              setAllQuestions(data);
              setMode('start');
            })
            .catch(err => {
              console.error("JSONの読み込みに失敗しました", err);
              setMode('start');
            });
        }
      }, []);

      const getRank = (correct, total) => {
        if (total === 0) return "称号なし";
        const rate = (correct / total) * 100;
        if (rate < 50) return "🔨 見習い職人";
        if (rate < 65) return "⛏️ 現場作業員";
        if (rate < 75) return "📋 職長クラス";
        if (rate < 85) return "🏗️ 現場監督";
        if (rate < 95) return "🏢 所長クラス";
        return "⭐ 伝説の監督";
      };

      const startSession = (isSecondStageRoute) => {
        let targets = allQuestions;
        if (isSecondStageRoute) {
          targets = allQuestions.filter(q => q.is_2nd_stage_relevant === true);
          if(targets.length === 0) targets = allQuestions;
        }
        const shuffled = [...targets].sort(() => 0.5 - Math.random()).slice(0, 10);
        setSessionQuestions(shuffled);
        setCurrentIndex(0);
        setScore(0);
        setTotalAnswered(0);
        setWeaknessQueue([]);
        resetTurn();
        setMode('quiz');
      };

      const resetTurn = () => {
        setSelectedChoice(null);
        setIsCorrect(null);
        setExplanation('');
      };

      const handleAnswer = async (choiceKey) => {
        if (selectedChoice) return;
        setSelectedChoice(choiceKey);
        const currentQ = weaknessQueue.length > 0 ? weaknessQueue[0] : sessionQuestions[currentIndex];
        const correct = (parseInt(choiceKey) === currentQ.answer);
        setIsCorrect(correct);
        if (correct) setScore(prev => prev + 1);
        setTotalAnswered(prev => prev + 1);

        if (!correct && currentQ.related_ids && currentQ.related_ids.length > 0) {
          const randomRelatedId = currentQ.related_ids[Math.floor(Math.random() * currentQ.related_ids.length)];
          const relatedQ = allQuestions.find(q => q.id === randomRelatedId);
          if (relatedQ) {
            setWeaknessQueue(prev => [...prev, relatedQ]);
          }
        }

        setIsAiLoading(true);
        try {
          const prompt = `
            ${SYSTEM_PROMPT}
            【問題データ】
            問題: ${currentQ.question}
            選択肢: ${JSON.stringify(currentQ.choices)}
            正解: ${currentQ.answer}
            ユーザーの解答: ${choiceKey} (${correct ? '正解' : '不正解'})
            本来の解説: ${currentQ.explanation}
            出題者の罠: ${currentQ.examiner_trap}
          `;

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          const data = await response.json();
          setExplanation(data.candidates[0].content.parts[0].text);
        } catch (error) {
          setExplanation("AI解説の取得に失敗しました。現場の電波状況を確認してください。");
        }
        setIsAiLoading(false);
      };

      const nextQuestion = () => {
        resetTurn();
        if (weaknessQueue.length > 0) {
          setWeaknessQueue(prev => prev.slice(1));
        } else {
          if (currentIndex + 1 < sessionQuestions.length) {
            setCurrentIndex(prev => prev + 1);
          } else {
            setMode('result');
          }
        }
      };

      if (mode === 'loading') return <div className="p-10 text-center text-xl font-bold">現場の足場を組立て中...</div>;
      
      if (mode === 'expired') return (
        <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-gray-900 text-white">
          <h1 className="text-3xl font-bold mb-4 text-red-500">【公開終了】</h1>
          <p className="mb-8 text-center">先行テスト配布期間は終了しました。<br/>最新のAIアプリと攻略情報はBANDコミュニティにて提供中です。</p>
          <a href={BAND_URL} className="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-lg shadow-lg">
            相馬塾 BANDコミュニティへ合流する
          </a>
        </div>
      );

      if (mode === 'start') return (
        <div className="max-w-md mx-auto mt-10 p-6 bg-white rounded-xl shadow-lg text-center border-t-8 border-blue-600">
          <h1 className="text-2xl font-extrabold mb-2">seko-can.com</h1>
          <p className="text-gray-600 mb-6 font-bold">一級建築施工管理技士 AI過去問アプリ</p>
          <button onClick={() => startSession(false)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded mb-4 shadow-md transition">
            1次試験 全範囲テストを開始（10問）
          </button>
          <button onClick={() => startSession(true)} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-4 rounded shadow-md transition">
            🔥 2次試験直結ルートを開始
          </button>
        </div>
      );

      if (mode === 'result') return (
        <div className="max-w-md mx-auto mt-10 p-6 bg-white rounded-xl shadow-lg text-center border-t-8 border-yellow-500">
          <h2 className="text-2xl font-bold mb-4">本日の作業終了！</h2>
          <p className="text-4xl font-extrabold mb-2">{score} / {totalAnswered} 問正解</p>
          <p className="text-xl font-bold text-gray-700 mb-6">現在の称号: <span className="text-blue-600">{getRank(score, totalAnswered)}</span></p>
          <button onClick={() => setMode('start')} className="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-4 rounded mb-4">
            現場事務所（トップ）へ戻る
          </button>
          <div className="mt-8 p-4 bg-green-50 rounded-lg border border-green-200">
            <p className="text-sm text-green-800 font-bold mb-2">＼ 改善要望や2次試験の質問はこちら ／</p>
            <a href={BAND_URL} target="_blank" className="block w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded text-center">
              BANDコミュニティを開く
            </a>
          </div>
        </div>
      );

      const currentQ = weaknessQueue.length > 0 ? weaknessQueue[0] : sessionQuestions[currentIndex];
      const isWeaknessMode = weaknessQueue.length > 0;

      return (
        <div className="max-w-xl mx-auto mt-6 p-4">
          <div className="bg-white p-6 rounded-xl shadow-lg">
            <div className="flex flex-wrap justify-between items-center mb-4 text-sm font-bold border-b pb-2">
              <span className="text-gray-500">{isWeaknessMode ? '⚠️ 弱点克服モード' : `第 ${currentIndex + 1} 問`}</span>
              <span className="bg-blue-100 text-blue-800 px-2 py-1 rounded">{currentQ.year}年度 {currentQ.session}</span>
              <span className="bg-gray-100 text-gray-800 px-2 py-1 rounded">{currentQ.subcategory}</span>
            </div>
            {currentQ.frequency >= 3 && (
              <div className="mb-2 text-red-600 font-extrabold text-sm animate-pulse">
                🔥 頻出重要問題（過去{currentQ.frequency}回出題）
              </div>
            )}
            <h2 className="text-lg font-bold mb-6 leading-relaxed text-gray-800">
              {currentQ.question}
            </h2>
            <div className="space-y-3 mb-6">
              {Object.entries(currentQ.choices).map(([key, text]) => {
                let btnClass = "w-full text-left p-4 rounded border-2 font-medium transition-all ";
                if (!selectedChoice) {
                  btnClass += "border-gray-200 hover:border-blue-400 hover:bg-blue-50";
                } else {
                  if (parseInt(key) === currentQ.answer) {
                    btnClass += "border-green-500 bg-green-50 text-green-900";
                  } else if (selectedChoice === key) {
                    btnClass += "border-red-500 bg-red-50 text-red-900";
                  } else {
                    btnClass += "border-gray-200 opacity-50";
                  }
                }
                return (
                  <button key={key} onClick={() => handleAnswer(key)} disabled={selectedChoice !== null} className={btnClass}>
                    <span className="inline-block w-6 h-6 text-center rounded-full bg-gray-200 text-gray-700 mr-3 text-sm leading-6">{key}</span>
                    {text}
                  </button>
                );
              })}
            </div>
            {selectedChoice && (
              <div className="mt-6 animate-fade-in">
                <div className={`text-2xl font-extrabold mb-4 text-center ${isCorrect ? 'text-green-600' : 'text-red-600'}`}>
                  {isCorrect ? '⭕ 正解！ヨシ！' : '❌ 不正解... (類似問題をキューに追加しました)'}
                </div>
                <div className="bg-gray-800 text-white p-5 rounded-lg shadow-inner">
                  <h3 className="text-yellow-400 font-bold mb-2 border-b border-gray-600 pb-1">AI現場所長の解説</h3>
                  {isAiLoading ? (
                    <div className="text-gray-300 animate-pulse">所長が解説を打設中...</div>
                  ) : (
                    <div className="text-sm leading-relaxed whitespace-pre-wrap">{explanation}</div>
                  )}
                </div>
                {!isAiLoading && (
                  <button onClick={nextQuestion} className="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded shadow-lg text-lg">
                    次の現場（問題）へ向かう
                  </button>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>
</body>
</html>
