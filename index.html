<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seko-can.com | 一級建築施工管理技士</title>
    
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var errDetails = error ? error.stack : '';
            document.body.innerHTML = '<div style="padding:20px; color:red; font-weight:bold;">🚨 エラー発生: ' + msg + '<br>行数: ' + lineNo + '<br><pre style="font-size:10px; margin-top:10px;">' + errDetails + '</pre></div>';
            return false;
        };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js" crossorigin="anonymous"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" crossorigin></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; background-color: #f3f4f6; }
        .blur-text { filter: blur(5px); user-select: none; pointer-events: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root">
        <div style="padding: 50px; text-align: center; font-weight: bold; color: #666;">
            ⏳ 現場（アプリ）を構築中...<br>
            <span style="font-size: 12px; font-weight: normal;">※この画面で止まる場合は翻訳エラーです</span>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const liffId = "2009463648-LX7h6H1q";
        
        const SECRET_PASSWORD = "0000"; 

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [view, setView] = useState('menu'); 
            const [mode, setMode] = useState('shoken');
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            
            const [showModal, setShowModal] = useState(false);
            const [isExplaining, setIsExplaining] = useState(false);
            
            const [explanation1, setExplanation1] = useState(''); 
            const [explanation2, setExplanation2] = useState(''); 
            
            const [showPassword, setShowPassword] = useState(false);
            const [inputPass, setInputPass] = useState('');

            useEffect(() => {
                const init = async () => {
                    try {
                        await liff.init({ liffId });
                        if (liff.isLoggedIn()) { 
                            setIsLoggedIn(true); 
                        } else { 
                            liff.login(); 
                        }
                    } catch (e) { 
                        console.error("LIFF Error", e); 
                    }
                };
                init();
            }, []);

            const startQuiz = async (selectedMode) => {
                setMode(selectedMode);
                setView('loading');
                try {
                    const response = await fetch('/H20-R7.json');
                    const data = await response.json();
                    setQuestions(data);
                    setCurrentIdx(0);
                    setView('quiz');
                } catch (error) {
                    alert("データの読み込みに失敗しました。");
                    setView('menu');
                }
            };

            const unlockKenno = () => {
                if (inputPass === SECRET_PASSWORD) {
                    setShowPassword(false);
                    setInputPass('');
                    startQuiz('kenno');
                } else {
                    alert("パスワードが違います。");
                }
            };

            const handleAnswer = async (choiceKey, choiceText) => {
                const currentQ = questions[currentIdx];
                if (!currentQ) return;
                
                setShowModal(true);       
                setIsExplaining(true);    
                setExplanation1('');
                setExplanation2('');

                // 🚨 原因だった箇所を「最も安全な文字の繋ぎ方」に完全修正
                const promptText = "あなたは1級建築施工管理技士の凄腕所長です。以下の問題とユーザーの回答に対し、2つに分けて解説してください。\n" +
                                   "【1次解説】：選択肢が合っているかの判定と、その理由を端的に。\n" +
                                   "【2次解説】：実際の現場でどう役立つか、2次試験（記述）にどう繋がるかの現場目線の深い知識。\n\n" +
                                   "問題: " + currentQ.question + "\n" +
                                   "選んだ選択肢: " + choiceText;

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: promptText })
                    });
                    
                    const data = await response.json();
                    if (!response.ok) throw new Error("APIエラー");
                    
                    let fullText = data.result || "解説を取得できませんでした。";
                    let part1 = fullText;
                    let part2 = "現場では、品質管理を徹底し、事前の施工計画書に基づく確認が重要です。2次試験の記述対策としても、この基本事項を必ず押さえておきましょう。";
                    
                    if (fullText.indexOf('【2次解説】') !== -1) {
                        const parts = fullText.split('【2次解説】');
                        part1 = parts[0].replace('【1次解説】', '').trim();
                        if (parts[1]) {
                            part2 = parts[1].trim();
                        }
                    }

                    setExplanation1(part1);
                    setExplanation2(part2);
                } catch(error) {
                    setExplanation1("AIエラー: " + error.message);
                }
                setIsExplaining(false); 
            };

            const nextQuestion = () => {
                setShowModal(false);
                if (currentIdx + 1 < questions.length) {
                    setCurrentIdx(currentIdx + 1);
                } else {
                    alert('全問終了しました！トップに戻ります。');
                    setView('menu');
                }
            };

            if (!isLoggedIn) return <div style={{ textAlign: 'center', marginTop: '50px', fontWeight: 'bold' }}>認証ゲート通過中...</div>;

            if (view === 'menu') {
                return (
                    <div className="max-w-md mx-auto p-6 pt-12">
                        <div className="bg-white rounded-2xl shadow-xl p-8 text-center border-t-8 border-blue-600">
                            <h1 className="text-3xl font-black mb-2">seko-can.com</h1>
                            <p className="text-blue-600 font-bold mb-8 text-sm">一級建築施工管理技士 AI過去問アプリ</p>
                            
                            {!showPassword ? (
                                <div className="space-y-4">
                                    <button onClick={() => startQuiz('shoken')} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow active:scale-95 transition">
                                        🔵【ショーケン版】<br/><span className="text-sm">1次試験 全範囲テスト</span>
                                    </button>

                                    <button onClick={() => setShowPassword(true)} className="w-full py-4 bg-gray-800 text-white rounded-xl font-bold shadow active:scale-95 transition">
                                        🔒【建能版】ロック解除<br/><span className="text-sm">パスワード入力へ</span>
                                    </button>
                                </div>
                            ) : (
                                <div className="bg-gray-100 p-6 rounded-xl border border-gray-300 fade-in">
                                    <p className="font-bold text-gray-800 mb-4 text-sm">有料版のパスワードを入力</p>
                                    <input 
                                        type="password" 
                                        value={inputPass}
                                        onChange={(e) => setInputPass(e.target.value)}
                                        className="w-full p-3 border border-gray-300 rounded-lg mb-4 text-center text-xl tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        placeholder="****"
                                    />
                                    <div className="flex gap-2">
                                        <button onClick={() => setShowPassword(false)} className="flex-1 py-3 bg-gray-300 text-gray-700 rounded-lg font-bold">戻る</button>
                                        <button onClick={unlockKenno} className="flex-1 py-3 bg-blue-600 text-white rounded-lg font-bold">解除</button>
                                    </div>
                                </div>
                            )}
                            <p className="mt-8 text-xs text-gray-400 font-bold">ログイン
