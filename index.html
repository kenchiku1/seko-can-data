<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seko-can.com | 一級建築施工管理技士</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; }
        .blur-text { filter: blur(5px); user-select: none; pointer-events: none; opacity: 0.6; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const liffId = "2009463648-LX7h6H1q";
        const SECRET_PASSWORD = "KENRYU"; 

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [view, setView] = useState('menu'); 
            const [mode, setMode] = useState('shoken');
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [showModal, setShowModal] = useState(false);
            const [isExplaining, setIsExplaining] = useState(false);
            const [judge, setJudge] = useState('');
            const [explanation1, setExplanation1] = useState(''); 
            const [explanation2, setExplanation2] = useState(''); 
            const [showPassword, setShowPassword] = useState(false);
            const [inputPass, setInputPass] = useState('');

            useEffect(() => {
                liff.init({ liffId }).then(() => {
                    if (liff.isLoggedIn()) { setIsLoggedIn(true); } else { liff.login(); }
                });
            }, []);

            // 🔽 履歴管理：解いた問題のIDを保存/取得
            const getSeenIds = () => JSON.parse(localStorage.getItem('seko_seen_ids') || '[]');
            const saveSeenId = (id) => {
                const ids = getSeenIds();
                if (!ids.includes(id)) {
                    ids.push(id);
                    localStorage.setItem('seko_seen_ids', JSON.stringify(ids));
                }
            };
            const clearHistory = () => localStorage.removeItem('seko_seen_ids');

            const startQuiz = async (m) => {
                setMode(m);
                setView('loading');
                setScore(0);
                try {
                    const res = await fetch('/H20-R7.json');
                    const data = await res.json();
                    let all = Array.isArray(data) ? data : (data.questions || []);
                    
                    // 🚨 未回答の問題のみを抽出
                    const seenIds = getSeenIds();
                    let unread = all.filter(q => !seenIds.includes(q.no || q.question));

                    // 全問解き終わっていたらリセット
                    if (unread.length === 0) {
                        clearHistory();
                        unread = all;
                    }

                    // 🔥 強力な揺らぎ（重み付きランダムシャッフル）
                    const randomized = [...unread].map(q => ({
                        ...q,
                        drawScore: (Number(q.frequency) || 1) * Math.random()
                    })).sort((a, b) => b.drawScore - a.drawScore);

                    setQuestions(randomized);
                    setCurrentIdx(0);
                    setView('quiz');
                } catch (e) { alert("読込エラー"); setView('menu'); }
            };

            const handleAnswer = async (key, text) => {
                const q = questions[currentIdx];
                const isCorrect = String(key) === String(q.answer);
                if (isCorrect) setScore(score + 1);
                
                // 解いた履歴に保存
                saveSeenId(q.no || q.question);

                setJudge(isCorrect ? '⭕️ 正解' : '❌ 不正解');
                setShowModal(true);       
                setIsExplaining(true);    
                
                let persona = mode === 'shoken' ? "先輩監督" : "現場所長";
                const prompt = persona + "として即答。余計な挨拶不要。\n問題:" + q.question + "\n正解:" + q.answer + "\n回答:" + text + "\n【1次】根拠(70字)\n【2次】現場実務の要(70字)";

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: prompt })
                    });
                    const data = await res.json();
                    const parts = (data.result || "").split('【2次】');
                    setExplanation1(parts[0].replace('【1次】','').trim());
                    setExplanation2(parts[1] ? parts[1].trim() : "品質管理の急所です。");
                } catch(e) { setExplanation1("エラー"); }
                setIsExplaining(false); 
            };

            if (!isLoggedIn) return null;

            if (view === 'menu') {
                const seenCount = getSeenIds().length;
                return (
                    <div className="max-w-md mx-auto p-6 pt-12">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 text-center border-t-8 border-blue-700">
                            <h1 className="text-4xl font-black mb-1 italic text-gray-800">seko-can</h1>
                            <p className="text-blue-700 font-bold mb-6 text-xs tracking-widest uppercase">Construction Management AI</p>
                            
                            <div className="mb-8 p-2 bg-blue-50 rounded-full inline-block px-4">
                                <p className="text-[10px] font-bold text-blue-600">既読の問題: {seenCount}件</p>
                            </div>

                            {!showPassword ? (
                                <div className="space-y-4">
                                    <button onClick={() => startQuiz('shoken')} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-xl active:scale-95 transition">🔵 ショーケン版</button>
                                    <button onClick={() => setShowPassword(true)} className="w-full py-5 bg-gray-800 text-white rounded-2xl font-bold shadow-xl active:scale-95 transition">🔒 建龍版</button>
                                    <button onClick={()=>{if(confirm('学習履歴をリセットしますか？')) {clearHistory(); location.reload();}}} className="text-[10px] text-gray-400 underline">履歴をリセットして全問復活</button>
                                </div>
                            ) : (
                                <div className="bg-gray-50 p-6 rounded-2xl border-2 border-dashed fade-in">
                                    <input type="text" value={inputPass} onChange={(e)=>setInputPass(e.target.value)} className="w-full p-4 border-2 rounded-xl mb-4 text-center font-black text-xl tracking-widest uppercase" placeholder="PASSWORD" />
                                    <div className="flex gap-2">
                                        <button onClick={()=>setShowPassword(false)} className="flex-1 py-3 bg-gray-300 rounded-xl font-bold">戻る</button>
                                        <button onClick={()=>{ if(inputPass.toUpperCase()===SECRET_PASSWORD) startQuiz('kenno'); else alert("不一致"); }} className="flex-1 py-3 bg-blue-700 text-white rounded-xl font-bold">解除</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (view === 'result') {
                const rate = Math.round((score / questions.length) * 100);
                return (
                    <div className="max-w-md mx-auto p-6 pt-12 fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-10 text-center border-t-8 border-orange-500">
                            <h2 className="text-sm font-bold mb-6 text-gray-400 tracking-widest uppercase">Results</h2>
                            <div className="mb-8 text-6xl font-black text-gray-800">{rate}%</div>
                            <div className="bg-orange-50 p-6 rounded-2xl mb-8 border border-orange-100 italic font-black text-orange-600">
                                {rate >= 80 ? '伝説の監理技術者' : rate >= 60 ? '一級施工管理技士' : '現場見習い'}
                            </div>
                            <button onClick={() => setView('menu')} className="w-full py-4 bg-gray-800 text-white rounded-xl font-bold shadow-lg">現場事務所へ戻る</button>
                        </div>
                    </div>
                );
            }

            if (view === 'loading') return <div className="text-center mt-20 font-black text-gray-400 animate-pulse">未体験の問題を抽出中...</div>;

            const q = questions[currentIdx];
            return (
                <div className="max-w-md mx-auto bg-white min-h-screen p-6 relative">
                    {!showModal ? (
                        <div className="fade-in">
                            <div className="flex justify-between items-center mb-6 border-b-2 border-gray-50 pb-2">
                                <p className="text-[10px] font-bold text-gray-400">SESSION.{currentIdx + 1} / {questions.length}</p>
                                <p className="text-[10px] font-bold text-blue-700 uppercase">{mode}</p>
                            </div>
                            <p className="font-bold text-gray-800 text-xl mb-10 leading-relaxed">{q.question}</p>
                            <div className="space-y-4">
                                {q.choices && Object.entries(q.choices).map(([k, t]) => (
                                    <button key={k} onClick={() => handleAnswer(k, t)} className="w-full p-5 text-left border-2 border-gray-100 rounded-2xl flex items-start active:bg-blue-50 transition">
                                        <span className="w-7 h-7 bg-gray-100 rounded-full text-center text-xs leading-7 mr-4 flex-shrink-0 font-black text-gray-500">{k}</span>
                                        <span className="text-sm font-bold text-gray-700 leading-snug">{t}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="fade-in flex flex-col h-full">
                            <div className={`text-6xl font-black text-center mb-10 py-4 rounded-3xl ${judge.includes('⭕️') ? 'text-green-600 bg-green-50' : 'text-red-600 bg-red-50'}`}>{judge}</div>
                            <div className="flex-1 space-y-8">
                                <div>
                                    <h3 className="text-[10px] font-black text-blue-600 mb-2 uppercase tracking-widest">■ Theory</h3>
                                    <div className="bg-blue-50 p-5 rounded-2xl text-sm font-bold text-gray-700 leading-relaxed">{isExplaining ? '解析中...' : explanation1}</div>
                                </div>
                                <div>
                                    <h3 className="text-[10px] font-black text-red-600 mb-2 uppercase tracking-widest">■ Site Insight</h3>
                                    {mode === 'kenno' ? (
                                        <div className="bg-red-50 p-5 rounded-2xl text-sm font-bold text-gray-700 leading-relaxed border border-red-100">{isExplaining ? '分析中...' : explanation2}</div>
                                    ) : (
                                        <div className="relative rounded-2xl bg-gray-50 p-5 border-2 border-dashed border-gray-300 overflow-hidden">
                                            <p className="text-sm blur-text font-bold">（建龍版で解除すると、現場目線の実戦的なアドバイスが表示されます）</p>
                                            <button onClick={() => { setView('menu'); setShowModal(false); setShowPassword(true); }} className="absolute inset-0 m-auto h-12 w-48 bg-gray-900 text-white text-[10px] font-black rounded-full shadow-2xl">🔒 建龍版で解除</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="mt-12 space-y-4 pb-12">
                                {!isExplaining && <button onClick={()=>{setShowModal(false); if(currentIdx+1 < questions.length) setCurrentIdx(currentIdx+1); else setView('result');}} className="w-full py-5 bg-blue-700 text-white rounded-2xl font-black text-xl shadow-xl">NEXT STEP</button>}
                                <button onClick={()=>{setView('menu'); setShowModal(false);}} className="text-gray-400 text-[10px] font-bold underline w-full text-center">事務所へ戻る</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
