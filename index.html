<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seko-can.com | 一級建築施工管理技士</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function App() {
            const [view, setView] = useState('menu');
            const [mode, setMode] = useState('');
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [showModal, setShowModal] = useState(false);
            const [judge, setJudge] = useState('');
            const [score, setScore] = useState(0);
            const [quizInfo, setQuizInfo] = useState({ year: '', session: '' });
            const [history, setHistory] = useState([]);

            const [selectedYear, setSelectedYear] = useState('R7');
            const [selectedSession, setSelectedSession] = useState('午前');

            useEffect(() => {
                const saved = localStorage.getItem('sekocan_history');
                if (saved) setHistory(JSON.parse(saved));
            }, []);

            const getRankInfo = (p) => {
                if (p >= 90) return { r: 'S', t: '施工管理技士', c: 'text-yellow-600', b: 'bg-yellow-100' };
                if (p >= 70) return { r: 'A', t: '主任技術者', c: 'text-blue-600', b: 'bg-blue-100' };
                if (p >= 50) return { r: 'B', t: '現場記録者', c: 'text-green-600', b: 'bg-green-100' };
                if (p >= 30) return { r: 'C', t: '書類整理係', c: 'text-orange-600', b: 'bg-orange-100' };
                return { r: 'D', t: '新規入場者', c: 'text-gray-600', b: 'bg-gray-200' };
            };

            const startQuiz = async () => {
                setView('loading');
                try {
                    const res = await fetch(`https://raw.githubusercontent.com/kenchiku1/seko-can-data/main/${selectedYear}.json?t=${Date.now()}`);
                    const data = await res.json();
                    const all = Array.isArray(data) ? data : (data.questions || []);
                    const filtered = all.filter(q => {
                        const s = String(q.session || "").trim();
                        return selectedSession === '午前' ? (s.includes('午前') || s.toUpperCase()==='AM') : (s.includes('午後') || s.toUpperCase()==='PM');
                    });
                    if (filtered.length === 0) { alert("データがありません"); setView('setup'); return; }
                    setQuestions(shuffle(filtered));
                    setCurrentIdx(0); setScore(0); setShowModal(false);
                    setQuizInfo({ year: selectedYear, session: selectedSession });
                    setView('quiz');
                } catch (e) { alert("読込失敗"); setView('setup'); }
            };

            const handleAnswer = (k) => {
                const q = questions[currentIdx];
                const isCorrect = String(k) === String(q.answer);
                if (isCorrect) setScore(s => s + 1);
                setJudge(isCorrect ? '⭕️ 正解' : '❌ 不正解');
                setShowModal(true);
            };

            const nextQuestion = () => {
                if (currentIdx + 1 < questions.length) {
                    setCurrentIdx(currentIdx + 1);
                    setShowModal(false);
                } else {
                    finishQuiz();
                }
            };

            const finishQuiz = () => {
                const p = Math.round((score / questions.length) * 100);
                const r = getRankInfo(p);
                const record = {
                    date: new Date().toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                    mode: mode === 'sho' ? 'ショーケン版' : '建龍版',
                    year: quizInfo.year, session: quizInfo.session,
                    score, total: questions.length, percentage: p,
                    title: r.t, rank: r.r
                };
                const newHistory = [record, ...history];
                setHistory(newHistory);
                localStorage.setItem('sekocan_history', JSON.stringify(newHistory));
                setView('result');
            };

            // --- 各画面の出力 ---

            if (view === 'menu') return (
                <div className="max-w-md mx-auto p-8 text-center pt-12">
                    <h1 className="text-5xl font-black mb-12 text-gray-800 tracking-tighter italic">seko-can</h1>
                    <div className="space-y-6">
                        <button onClick={()=>{setMode('sho');setView('setup')}} className="w-full p-8 bg-white border-4 border-blue-500 rounded-3xl shadow-xl active:scale-95 transition">
                            <div className="text-blue-600 font-black text-2xl">ショーケン版</div>
                            <div className="text-gray-500 text-sm font-bold">無料解説・基本演習</div>
                        </button>
                        <button onClick={()=>{setMode('ken');setView('setup')}} className="w-full p-8 bg-gray-800 border-4 border-yellow-500 rounded-3xl shadow-xl active:scale-95 transition">
                            <div className="text-yellow-500 font-black text-2xl">建龍版 🔒</div>
                            <div className="text-gray-400 text-sm font-bold">プレミアム解説・集中攻略</div>
                        </button>
                        <button onClick={()=>setView('history')} className="w-full py-4 text-gray-600 font-bold border-2 border-gray-300 rounded-2xl bg-white active:bg-gray-50">
                            📋 現場経歴書を確認
                        </button>
                    </div>
                </div>
            );

            if (view === 'setup') return (
                <div className="max-w-md mx-auto p-8 text-center pt-10">
                    <div className={`inline-block px-6 py-2 rounded-full mb-8 font-black ${mode==='sho'?'bg-blue-100 text-blue-600':'bg-gray-800 text-yellow-500'}`}>
                        {mode==='sho'?'ショーケン版':'建龍版 🔒'}
                    </div>
                    <div className="bg-white p-6 rounded-3xl shadow-xl text-left border border-gray-200">
                        <label className="block text-sm font-black text-gray-500 mb-2 ml-1">施工年度</label>
                        <select value={selectedYear} onChange={e=>setSelectedYear(e.target.value)} className="w-full p-4 mb-6 border-2 rounded-2xl font-bold text-lg bg-gray-50 outline-none focus:border-blue-500">
                            {["R7","R6","R5","R4","R3","R2","R1","H30","H29","H28","H27","H26","H25"].map(y=><option key={y} value={y}>{y}年度</option>)}
                        </select>
                        <label className="block text-sm font-black text-gray-500 mb-2 ml-1">セッション</label>
                        <select value={selectedSession} onChange={e=>setSelectedSession(e.target.value)} className="w-full p-4 mb-8 border-2 rounded-2xl font-bold text-lg bg-gray-50 outline-none focus:border-blue-500">
                            <option value="午前">午前 (AM)</option><option value="午後">午後 (PM)</option>
                        </select>
                        <button onClick={startQuiz} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-xl shadow-lg active:bg-blue-800">現場入場（開始）</button>
                    </div>
                    <button onClick={()=>setView('menu')} className="mt-8 text-gray-400 font-bold">← モード選択に戻る</button>
                </div>
            );

            if (view === 'loading') return <div className="text-center mt-40 font-black text-gray-400 animate-pulse text-2xl">資材搬入中...</div>;

            if (view === 'quiz') {
                const q = questions[currentIdx];
                // 【画像URLの生成】
                const imageUrl = q.imageUrl ? `https://raw.githubusercontent.com/kenchiku1/seko-can-data/main/images/${q.imageUrl}` : null;

                return (
                    <div className="max-w-md mx-auto p-4 flex flex-col min-h-screen">
                        <div className="flex justify-between items-center mb-4 border-b-2 pb-2">
                            <span className="font-bold text-gray-400">{quizInfo.year} {quizInfo.session}</span>
                            <span className="font-black text-blue-600 text-xl">No.{currentIdx + 1}</span>
                        </div>
                        {!showModal ? (
                            <div className="flex-grow overflow-y-auto pb-20">
                                <p className="text-xl font-bold mb-6 text-gray-800 leading-relaxed whitespace-pre-wrap">{q.question}</p>
                                
                                {/* 🖼️ 【重要】画像表示エリア */}
                                {imageUrl && (
                                    <div className="mb-6 bg-white p-2 rounded-xl shadow-inner border border-gray-200">
                                        <img 
                                            src={imageUrl} 
                                            alt="問題用図面" 
                                            className="w-full h-auto rounded-lg mx-auto"
                                            onError={(e) => e.target.style.display = 'none'}
                                        />
                                    </div>
                                )}

                                <div className="space-y-4">
                                    {q.choices && Object.entries(q.choices).map(([k, t]) => (
                                        <button key={k} onClick={() => handleAnswer(k)} className="w-full p-5 border-2 border-gray-300 rounded-2xl text-left font-bold text-gray-700 bg-white shadow-sm active:bg-blue-50 active:border-blue-500 transition">
                                            {k}. {t}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col flex-grow">
                                <div className={`text-6xl font-black text-center mb-8 py-4 ${judge.includes('⭕️') ? 'text-red-500' : 'text-blue-600'}`}>{judge}</div>
                                <div className="bg-white p-6 rounded-3xl shadow-inner border border-gray-200 mb-8 flex-grow overflow-y-auto">
                                    <div className="mb-8">
                                        <span className="inline-block bg-blue-100 text-blue-800 text-xs font-black px-3 py-1 rounded-full mb-3">ショーケン版解説</span>
                                        <p className="text-gray-800 font-bold leading-relaxed">{q.explanation_sho || "解説準備中です。"}</p>
                                    </div>
                                    <div className={`p-5 rounded-2xl border-2 ${mode==='sho'?'bg-gray-100 border-dashed border-gray-300':'bg-yellow-50 border-yellow-200'}`}>
                                        <div className="flex items-center mb-3">
                                            <span className={`text-xs font-black px-3 py-1 rounded-full ${mode==='sho'?'bg-gray-400 text-white':'bg-yellow-500 text-white'}`}>建龍版解説</span>
                                            {mode==='sho' && <span className="ml-2">🔒</span>}
                                        </div>
                                        {mode==='sho' ? (
                                            <p className="text-gray-400 font-bold blur-[2px] select-none text-sm">プレミアム解説は建龍版で解放されます。</p>
                                        ) : (
                                            <p className="text-gray-800 font-bold leading-relaxed text-sm">{q.explanation_ken || "プレミアム解説準備中。"}</p>
                                        )}
                                    </div>
                                </div>
                                <button onClick={nextQuestion} className="w-full py-5 bg-gray-800 text-white rounded-2xl font-black text-2xl shadow-xl active:bg-black mb-8">
                                    {currentIdx + 1 < questions.length ? '次の問題へ' : '結果発表へ'}
                                </button>
                            </div>
                        )}
                    </div>
                );
            }

            if (view === 'result') {
                const p = Math.round((score/questions.length)*100);
                const r = getRankInfo(p);
                return (
                    <div className="max-w-md mx-auto p-8 text-center pt-16">
                        <div className={`p-10 rounded-[40px] mb-12 shadow-2xl border-8 border-white ${r.b}`}>
                            <p className="font-black text-gray-500 mb-2">判定結果</p>
                            <div className={`text-8xl font-black mb-4 ${r.c}`}>{r.r}</div>
                            <div className={`text-3xl font-black ${r.c}`}>{r.t}</div>
                            <p className="mt-4 font-bold text-gray-600">正答率 {p}%</p>
                        </div>
                        <button onClick={()=>setView('menu')} className="w-full py-6 bg-blue-600 text-white rounded-3xl font-black text-2xl shadow-xl active:bg-blue-800">現場事務所へ戻る</button>
                    </div>
                );
            }

            if (view === 'history') return (
                <div className="max-w-md mx-auto p-6">
                    <div className="flex justify-between items-center mb-8"><h2 className="text-3xl font-black text-gray-800">現場経歴書</h2><button onClick={()=>setView('menu')} className="text-blue-600 font-black text-lg">戻る</button></div>
                    <div className="space-y-4">
                        {history.length === 0 ? <p className="text-center py-20 font-black text-gray-300 text-xl">経歴なし</p> : 
                         history.map((h, i) => {
                            const r = getRankInfo(h.percentage);
                            return (
                                <div key={i} className={`p-5 rounded-3xl bg-white border-l-[12px] shadow-md ${r.b.replace('bg-', 'border-').replace('100', '400')}`}>
                                    <div className="flex justify-between text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest"><span>{h.date}</span><span>{h.mode}</span></div>
                                    <div className="flex justify-between items-center">
                                        <div className="font-black text-xl text-gray-800">{h.year} {h.session}</div>
                                        <div className={`font-black text-lg ${r.c}`}>{r.r}: {r.t}</div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
            return null;
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
