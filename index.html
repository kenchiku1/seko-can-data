<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seko-can.com | 一級建築施工管理技士</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const liffId = "2009463648-LX7h6H1q";

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [view, setView] = useState('menu');
            const [mode, setMode] = useState(''); // 'shoken' or 'kenno'

            useEffect(() => {
                const init = async () => {
                    try {
                        await liff.init({ liffId });
                        if (liff.isLoggedIn()) { setIsLoggedIn(true); } else { liff.login(); }
                    } catch (e) { console.error(e); }
                };
                init();
            }, []);

            if (!isLoggedIn) return <div className="flex h-screen items-center justify-center">認証ゲート通過中...</div>;

            if (view === 'menu') {
                return (
                    <div className="max-w-md mx-auto p-6 pt-16">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 text-center border-t-8 border-blue-600">
                            <h1 className="text-3xl font-black text-gray-900 mb-1">seko-can.com</h1>
                            <p className="text-blue-600 font-bold mb-8 text-sm">一級建築施工管理技士 AI過去問アプリ</p>
                            
                            <button 
                                onClick={() => { setMode('shoken'); setView('quiz'); }}
                                className="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-lg mb-4 text-lg active:scale-95 transition"
                            >
                                【ショーケン版】<br/><span className="text-sm opacity-90">1次試験 全範囲テスト</span>
                            </button>

                            <button 
                                onClick={() => { setMode('kenno'); setView('quiz'); }}
                                className="w-full py-5 bg-gradient-to-br from-amber-700 to-orange-800 text-white rounded-2xl font-bold shadow-lg text-lg active:scale-95 transition"
                            >
                                🔥【建能版】<br/><span className="text-sm opacity-90">1次突破（2次直結型）ルート</span>
                            </button>

                            <div className="mt-8 p-4 bg-gray-50 rounded-xl border border-gray-100 text-sm font-bold text-gray-500">
                                ログイン中：相馬所長
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto p-4 pt-10">
                    <div className={`bg-white rounded-2xl p-6 shadow-xl border-l-8 ${mode === 'kenno' ? 'border-orange-700' : 'border-blue-600'}`}>
                        <p className={`text-xs font-black mb-2 ${mode === 'kenno' ? 'text-orange-700' : 'text-blue-600'}`}>
                            {mode === 'kenno' ? '🔥 建能版・実戦演習' : '📘 ショーケン版・基礎演習'}
                        </p>
                        <p className="font-bold text-gray-800 leading-relaxed mb-8">
                            {mode === 'kenno' ? '【記述式対策】コンクリートの打込みにおいて、コールドジョイントを防止するための留意点を述べよ。' : '建築基準法上の「延べ面積」の定義として正しいものはどれか？'}
                        </p>
                        <div className="space-y-3">
                            <button onClick={() => alert('明日、AI解説機能を連結します！')} className="w-full p-4 text-left border rounded-xl font-bold text-gray-700 hover:bg-gray-50 active:bg-gray-100">
                                回答を表示してAI解説を聞く
                            </button>
                        </div>
                        <button onClick={() => setView('menu')} className="mt-8 text-gray-400 text-xs font-bold underline w-full text-center">メニューへ戻る</button>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
