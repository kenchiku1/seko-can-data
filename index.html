<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seko-can.com | 一級建築施工管理技士</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const liffId = "2009463648-LX7h6H1q";

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [view, setView] = useState('menu'); // menu, loading, quiz, error
            const [mode, setMode] = useState('shoken');
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [errorMessage, setErrorMessage] = useState('');

            useEffect(() => {
                const init = async () => {
                    try {
                        await liff.init({ liffId });
                        if (liff.isLoggedIn()) { setIsLoggedIn(true); } else { liff.login(); }
                    } catch (e) { console.error("LIFF Error", e); }
                };
                init();
            }, []);

            // 🔽 ここが新しい「データ搬入」の仕組みです
            const startQuiz = async (selectedMode) => {
                setMode(selectedMode);
                setView('loading');
                try {
                    const response = await fetch('/H20-R7.json');
                    if (!response.ok) throw new Error(`ファイルが見つかりません。通信エラー: ${response.status}`);
                    
                    const data = await response.json();
                    if (!Array.isArray(data) || data.length === 0) {
                        throw new Error("問題データが空か、形式が間違っています。");
                    }
                    
                    setQuestions(data);
                    setCurrentIdx(0);
                    setView('quiz');
                } catch (error) {
                    setErrorMessage(error.message);
                    setView('error');
                }
            };

            if (!isLoggedIn) return <div style={{ textAlign: 'center', marginTop: '50px', fontWeight: 'bold' }}>認証ゲート通過中...</div>;

            if (view === 'menu') {
                return (
                    <div className="max-w-md mx-auto p-6 pt-12">
                        <div className="bg-white rounded-2xl shadow-xl p-8 text-center border-t-8 border-blue-600">
                            <h1 className="text-3xl font-black mb-2">seko-can.com</h1>
                            <p className="text-blue-600 font-bold mb-8 text-sm">一級建築施工管理技士 AI過去問アプリ</p>
                            
                            <button onClick={() => startQuiz('shoken')} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow mb-4">
                                【ショーケン版】<br/><span className="text-sm">1次試験 全範囲テストを開始</span>
                            </button>

                            <button onClick={() => startQuiz('kenno')} className="w-full py-4 bg-orange-600 text-white rounded-xl font-bold shadow">
                                🔥【建能版】<br/><span className="text-sm">1次突破（2次直結型）を開始</span>
                            </button>
                            <p className="mt-8 text-xs text-gray-400 font-bold">ログイン中：相馬所長</p>
                        </div>
                    </div>
                );
            }

            if (view === 'loading') {
                return <div className="text-center mt-20 font-bold text-gray-600">問題データ（H20-R7.json）を搬入中...</div>;
            }

            if (view === 'error') {
                return (
                    <div className="max-w-md mx-auto p-6 pt-12 text-center">
                        <div className="bg-white rounded-2xl p-6 shadow-xl border-t-8 border-red-600">
                            <p className="font-bold text-red-600 mb-4">⚠️ データの搬入に失敗しました</p>
                            <p className="text-sm text-gray-600 mb-6">{errorMessage}</p>
                            <button onClick={() => setView('menu')} className="px-6 py-2 bg-gray-200 rounded-lg font-bold">メニューに戻る</button>
                        </div>
                    </div>
                );
            }

            const currentQ = questions[currentIdx];

            return (
                <div className="max-w-md mx-auto p-6 pt-8">
                    <div className="bg-white rounded-2xl p-6 shadow-xl border-t-8 border-gray-800">
                        <p className="text-xs font-bold text-gray-500 mb-2">
                            {mode === 'kenno' ? '🔥 建能版' : '📘 ショーケン版'} - 第 {currentIdx + 1} 問 / 全 {questions.length} 問
                        </p>
                        
                        {/* わざと「むき出しのデータ」を表示して中身を検査します */}
                        <div className="mb-6 p-4 bg-gray-50 rounded-lg text-sm overflow-auto max-h-64 border border-gray-200">
                            <p className="font-bold text-gray-800 mb-2">【搬入された生データ】</p>
                            <pre className="text-xs text-gray-600 whitespace-pre-wrap">{JSON.stringify(currentQ, null, 2)}</pre>
                        </div>

                        <p className="text-sm text-blue-600 font-bold mb-4">※現在、JSONデータの構造を検査するため「むき出し」で表示しています。エラーではありません。</p>

                        <div className="flex justify-between mt-8">
                            <button onClick={() => setView('menu')} className="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg font-bold text-sm">戻る</button>
                            <button onClick={() => setCurrentIdx(prev => (prev + 1) % questions.length)} className="px-4 py-2 bg-blue-600 text-white rounded-lg font-bold text-sm">次の問題へ</button>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
